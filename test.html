<h1>🃏 Poker Hand Test Suite</h1>
<p class="subtitle">Evaluates <code>evaluatePokerHand</code> + <code>compareHands</code> — open in browser via http://localhost:5173/test.html</p>

<script type="module">
// ─── Inline poker evaluator (mirrors src/poker.js exactly) ─────────────────

function evaluatePokerHand(cards) {
  if (!cards || cards.length !== 5)
    return { rank: 0, label: 'Invalid Hand', kickers: [] };

  const normalizedVals = cards.map(c => c.rank === 1 ? 14 : c.rank);
  normalizedVals.sort((a, b) => b - a);

  const counts = {};
  normalizedVals.forEach(v => { counts[v] = (counts[v] || 0) + 1; });
  const countEntries = Object.entries(counts).map(([val, count]) => ({ val: parseInt(val), count }));
  countEntries.sort((a, b) => b.count - a.count || b.val - a.val);

  const isFlush = cards.every(c => c.suit === cards[0].suit);

  let isStraight = false, straightHigh = 0;
  const uniqueVals = [...new Set(normalizedVals)];
  if (uniqueVals.length === 5) {
    if (uniqueVals[0] - uniqueVals[4] === 4) {
      isStraight = true; straightHigh = uniqueVals[0];
    } else if (uniqueVals[0] === 14 && uniqueVals[1] === 5 && uniqueVals[2] === 4 && uniqueVals[3] === 3 && uniqueVals[4] === 2) {
      isStraight = true; straightHigh = 5;
    }
  }

  const rn = v => ({ 14:'Aces',13:'Kings',12:'Queens',11:'Jacks',10:'10s',9:'9s',8:'8s',7:'7s',6:'6s',5:'5s',4:'4s',3:'3s',2:'2s' }[v] || v.toString());
  const rs = v => ({ 14:'Ace',13:'King',12:'Queen',11:'Jack' }[v] || v.toString());

  if (isFlush && isStraight && straightHigh === 14) return { rank: 10, label: 'Royal Flush', kickers: [14] };
  if (isFlush && isStraight) return { rank: 9, label: `Straight Flush (${rs(straightHigh)} High)`, kickers: [straightHigh] };
  if (countEntries[0].count === 4) return { rank: 8, label: `Four of a Kind (${rn(countEntries[0].val)})`, kickers: [countEntries[0].val, countEntries[1].val] };
  if (countEntries[0].count === 3 && countEntries[1].count === 2) return { rank: 7, label: `Full House (${rn(countEntries[0].val)} full of ${rn(countEntries[1].val)})`, kickers: [countEntries[0].val, countEntries[1].val] };
  if (isFlush) return { rank: 6, label: `Flush (${rs(normalizedVals[0])} High)`, kickers: [...normalizedVals] };
  if (isStraight) return { rank: 5, label: `Straight (${rs(straightHigh)} High)`, kickers: [straightHigh] };
  if (countEntries[0].count === 3) return { rank: 4, label: `Three of a Kind (${rn(countEntries[0].val)})`, kickers: [countEntries[0].val, countEntries[1].val, countEntries[2].val] };
  if (countEntries[0].count === 2 && countEntries[1].count === 2) return { rank: 3, label: `Two Pair (${rn(countEntries[0].val)} & ${rn(countEntries[1].val)})`, kickers: [countEntries[0].val, countEntries[1].val, countEntries[2].val] };
  if (countEntries[0].count === 2) return { rank: 2, label: `Pair of ${rn(countEntries[0].val)}`, kickers: [countEntries[0].val, countEntries[1].val, countEntries[2].val, countEntries[3].val] };
  return { rank: 1, label: `High Card (${rs(normalizedVals[0])})`, kickers: [...normalizedVals] };
}

function compareHands(handA, handB, standingPlayer = null, firstToStand = null, firstToCompleteHand = null, p1 = 'Alice', p2 = 'Bob') {
  const evalA = evaluatePokerHand(handA);
  const evalB = evaluatePokerHand(handB);
  if (evalA.rank > evalB.rank) return { winner: 'A', labelA: evalA.label, labelB: evalB.label, reason: `Higher hand rank: ${evalA.label}` };
  if (evalB.rank > evalA.rank) return { winner: 'B', labelA: evalA.label, labelB: evalB.label, reason: `Higher hand rank: ${evalB.label}` };
  const len = Math.max(evalA.kickers.length, evalB.kickers.length);
  for (let i = 0; i < len; i++) {
    const vA = evalA.kickers[i] || 0, vB = evalB.kickers[i] || 0;
    if (vA > vB) return { winner: 'A', labelA: evalA.label, labelB: evalB.label, reason: `Better kicker (${vA} vs ${vB})` };
    if (vB > vA) return { winner: 'B', labelA: evalA.label, labelB: evalB.label, reason: `Better kicker (${vB} vs ${vA})` };
  }
  if (firstToStand) {
    if (firstToStand === p1) return { winner: 'A', labelA: evalA.label, labelB: evalB.label, reason: `Tiebreaker: ${p1} stood first` };
    if (firstToStand === p2) return { winner: 'B', labelA: evalA.label, labelB: evalB.label, reason: `Tiebreaker: ${p2} stood first` };
  }
  if (standingPlayer) {
    if (standingPlayer === p1) return { winner: 'A', labelA: evalA.label, labelB: evalB.label, reason: `Tiebreaker: ${p1} stood first` };
    if (standingPlayer === p2) return { winner: 'B', labelA: evalA.label, labelB: evalB.label, reason: `Tiebreaker: ${p2} stood first` };
  }
  if (firstToCompleteHand) {
    if (firstToCompleteHand === p1) return { winner: 'A', labelA: evalA.label, labelB: evalB.label, reason: `Tiebreaker: ${p1} completed hand first` };
    if (firstToCompleteHand === p2) return { winner: 'B', labelA: evalA.label, labelB: evalB.label, reason: `Tiebreaker: ${p2} completed hand first` };
  }
  return { winner: 'A', labelA: evalA.label, labelB: evalB.label, reason: `Tiebreaker: ${p1} wins by default` };
}

// ─── Test helpers ───────────────────────────────────────────────────────────

const c = (rank, suit) => ({ rank, suit }); // shorthand card constructor

function cardStr(cards) {
  if (!cards || cards.length === 0) return '(empty)';
  const rmap = { 1:'A', 11:'J', 12:'Q', 13:'K' };
  return cards.map(card => `${rmap[card.rank] || card.rank}${card.suit}`).join(' ');
}

let passed = 0, failed = 0;
const suites = {};

function test(suite, name, fn) {
  if (!suites[suite]) suites[suite] = [];
  const t0 = performance.now();
  let ok = true, err = null;
  try { fn(); }
  catch(e) { ok = false; err = e.message; }
  const ms = (performance.now() - t0).toFixed(2);
  suites[suite].push({ name, ok, err, ms });
  ok ? passed++ : failed++;
}

function expect(val) {
  return {
    toBe(expected) {
      if (val !== expected) throw new Error(`Expected ${JSON.stringify(expected)}, got ${JSON.stringify(val)}`);
    },
    toEqual(expected) {
      const a = JSON.stringify(val), b = JSON.stringify(expected);
      if (a !== b) throw new Error(`Expected ${b}, got ${a}`);
    },
    toContain(substr) {
      if (!String(val).includes(substr)) throw new Error(`Expected "${val}" to contain "${substr}"`);
    }
  };
}

// ─── SUITE 1: Hand detection — evaluatePokerHand ────────────────────────────

test('Hand Detection', 'Royal Flush — A K Q J 10 same suit', () => {
  const h = [c(1,'S'), c(13,'S'), c(12,'S'), c(11,'S'), c(10,'S')];
  const r = evaluatePokerHand(h);
  expect(r.rank).toBe(10);
  expect(r.label).toBe('Royal Flush');
});

test('Hand Detection', 'Straight Flush — 9 8 7 6 5 hearts', () => {
  const h = [c(9,'H'), c(8,'H'), c(7,'H'), c(6,'H'), c(5,'H')];
  const r = evaluatePokerHand(h);
  expect(r.rank).toBe(9);
  expect(r.label).toContain('Straight Flush');
  expect(r.label).toContain('9');
});

test('Hand Detection', 'Straight Flush — K Q J 10 9 clubs', () => {
  const h = [c(13,'C'), c(12,'C'), c(11,'C'), c(10,'C'), c(9,'C')];
  const r = evaluatePokerHand(h);
  expect(r.rank).toBe(9);
  expect(r.label).toContain('King');
});

test('Hand Detection', 'Four of a Kind — four Queens', () => {
  const h = [c(12,'S'), c(12,'H'), c(12,'D'), c(12,'C'), c(3,'S')];
  const r = evaluatePokerHand(h);
  expect(r.rank).toBe(8);
  expect(r.label).toContain('Queens');
  expect(r.kickers[0]).toBe(12);
  expect(r.kickers[1]).toBe(3); // kicker
});

test('Hand Detection', 'Four of a Kind — four 2s with Ace kicker', () => {
  const h = [c(2,'S'), c(2,'H'), c(2,'D'), c(2,'C'), c(1,'S')];
  const r = evaluatePokerHand(h);
  expect(r.rank).toBe(8);
  expect(r.kickers[1]).toBe(14); // Ace = 14 after normalization
});

test('Hand Detection', 'Full House — Kings full of 4s', () => {
  const h = [c(13,'S'), c(13,'H'), c(13,'D'), c(4,'S'), c(4,'C')];
  const r = evaluatePokerHand(h);
  expect(r.rank).toBe(7);
  expect(r.label).toContain('Kings');
  expect(r.label).toContain('4s');
  expect(r.kickers[0]).toBe(13);
  expect(r.kickers[1]).toBe(4);
});

test('Hand Detection', 'Flush — 5 spades, not a straight', () => {
  const h = [c(2,'S'), c(5,'S'), c(7,'S'), c(9,'S'), c(13,'S')];
  const r = evaluatePokerHand(h);
  expect(r.rank).toBe(6);
  expect(r.label).toContain('Flush');
  expect(r.label).toContain('King');
});

test('Hand Detection', 'Flush — Ace high all hearts', () => {
  const h = [c(1,'H'), c(3,'H'), c(6,'H'), c(8,'H'), c(10,'H')];
  const r = evaluatePokerHand(h);
  expect(r.rank).toBe(6);
  expect(r.label).toContain('Ace');
});

test('Hand Detection', 'Straight — 10 9 8 7 6 mixed suits', () => {
  const h = [c(10,'S'), c(9,'H'), c(8,'D'), c(7,'C'), c(6,'S')];
  const r = evaluatePokerHand(h);
  expect(r.rank).toBe(5);
  expect(r.label).toContain('Straight');
  expect(r.label).toContain('10');
  expect(r.kickers[0]).toBe(10);
});

test('Hand Detection', 'Straight — Ace-high A K Q J 10 mixed (NOT a Royal Flush)', () => {
  const h = [c(1,'S'), c(13,'H'), c(12,'D'), c(11,'C'), c(10,'S')];
  const r = evaluatePokerHand(h);
  expect(r.rank).toBe(5);
  expect(r.label).toContain('Ace');
  expect(r.kickers[0]).toBe(14);
});

test('Hand Detection', 'Three of a Kind — three 7s', () => {
  const h = [c(7,'S'), c(7,'H'), c(7,'D'), c(2,'C'), c(5,'S')];
  const r = evaluatePokerHand(h);
  expect(r.rank).toBe(4);
  expect(r.label).toContain('7s');
});

test('Hand Detection', 'Two Pair — Aces and 5s', () => {
  const h = [c(1,'S'), c(1,'H'), c(5,'D'), c(5,'C'), c(9,'S')];
  const r = evaluatePokerHand(h);
  expect(r.rank).toBe(3);
  expect(r.label).toContain('Aces');
  expect(r.label).toContain('5s');
  expect(r.kickers[0]).toBe(14);
  expect(r.kickers[1]).toBe(5);
  expect(r.kickers[2]).toBe(9); // the kicker
});

test('Hand Detection', 'One Pair — pair of Jacks', () => {
  const h = [c(11,'S'), c(11,'H'), c(2,'D'), c(7,'C'), c(9,'S')];
  const r = evaluatePokerHand(h);
  expect(r.rank).toBe(2);
  expect(r.label).toContain('Jacks');
  expect(r.kickers[0]).toBe(11);
});

test('Hand Detection', 'High Card — Ace high', () => {
  const h = [c(1,'S'), c(3,'H'), c(7,'D'), c(9,'C'), c(2,'S')];
  const r = evaluatePokerHand(h);
  expect(r.rank).toBe(1);
  expect(r.label).toContain('Ace');
});

test('Hand Detection', 'High Card — King high (no pair)', () => {
  const h = [c(13,'S'), c(2,'H'), c(4,'D'), c(6,'C'), c(8,'S')];
  const r = evaluatePokerHand(h);
  expect(r.rank).toBe(1);
  expect(r.label).toContain('King');
});

// ─── SUITE 2: Wheel straight (Ace-low) ─────────────────────────────────────

test('Wheel Straight (Ace-Low)', 'A 2 3 4 5 same suit = Straight Flush (5-high)', () => {
  const h = [c(1,'D'), c(2,'D'), c(3,'D'), c(4,'D'), c(5,'D')];
  const r = evaluatePokerHand(h);
  expect(r.rank).toBe(9);
  expect(r.kickers[0]).toBe(5); // 5 is the high card of the wheel
});

test('Wheel Straight (Ace-Low)', 'A 2 3 4 5 mixed suits = plain Straight (5-high)', () => {
  const h = [c(1,'S'), c(2,'H'), c(3,'D'), c(4,'C'), c(5,'S')];
  const r = evaluatePokerHand(h);
  expect(r.rank).toBe(5);
  expect(r.kickers[0]).toBe(5);
});

test('Wheel Straight (Ace-Low)', 'Wheel high card is 5 (NOT 14/Ace)', () => {
  const h = [c(1,'S'), c(2,'H'), c(3,'D'), c(4,'C'), c(5,'S')];
  const r = evaluatePokerHand(h);
  expect(r.kickers[0]).toBe(5); // must NOT be 14
});

test('Wheel Straight (Ace-Low)', 'A 2 3 4 6 is NOT a straight', () => {
  const h = [c(1,'S'), c(2,'H'), c(3,'D'), c(4,'C'), c(6,'S')];
  const r = evaluatePokerHand(h);
  if (r.rank === 5) throw new Error('A-2-3-4-6 was incorrectly classified as a straight');
});

test('Wheel Straight (Ace-Low)', 'Wheel ranks lower than 6-high straight', () => {
  const wheel  = [c(1,'S'), c(2,'H'), c(3,'D'), c(4,'C'), c(5,'H')];
  const sixHigh = [c(2,'S'), c(3,'H'), c(4,'D'), c(5,'C'), c(6,'H')];
  const rW = evaluatePokerHand(wheel);
  const r6 = evaluatePokerHand(sixHigh);
  // Both are rank 5 straights; wheel kicker = 5, six-high kicker = 6
  expect(rW.rank).toBe(5);
  expect(r6.rank).toBe(5);
  if (rW.kickers[0] >= r6.kickers[0]) throw new Error('Wheel should rank lower than 6-high straight');
});

// ─── SUITE 3: Kicker resolution ─────────────────────────────────────────────

test('Kicker Resolution', 'Pair of 9s: A kicker beats K kicker', () => {
  const handA = [c(9,'S'), c(9,'H'), c(1,'D'), c(3,'C'), c(5,'S')]; // pair 9s, A kicker
  const handB = [c(9,'D'), c(9,'C'), c(13,'S'), c(3,'H'), c(5,'D')]; // pair 9s, K kicker
  const r = compareHands(handA, handB);
  expect(r.winner).toBe('A');
});

test('Kicker Resolution', 'Three 5s: J kicker beats 10 kicker', () => {
  const handA = [c(5,'S'), c(5,'H'), c(5,'D'), c(11,'C'), c(2,'S')]; // trips 5, J kicker
  const handB = [c(5,'C'), c(5,'S'), c(5,'H'), c(10,'C'), c(2,'D')]; // trips 5, 10 kicker
  const r = compareHands(handA, handB);
  expect(r.winner).toBe('A');
});

test('Kicker Resolution', 'High card tie on first kicker, B wins on second', () => {
  const handA = [c(1,'S'), c(10,'H'), c(7,'D'), c(4,'C'), c(2,'S')]; // A 10 7 4 2
  const handB = [c(1,'H'), c(10,'D'), c(8,'C'), c(4,'S'), c(2,'D')]; // A 10 8 4 2 (8 > 7)
  const r = compareHands(handA, handB);
  expect(r.winner).toBe('B');
});

test('Kicker Resolution', 'Two-pair: higher pair wins regardless of second pair', () => {
  const handA = [c(1,'S'), c(1,'H'), c(3,'D'), c(3,'C'), c(7,'S')]; // A+3 two pair
  const handB = [c(13,'S'), c(13,'H'), c(12,'D'), c(12,'C'), c(7,'D')]; // K+Q two pair
  const r = compareHands(handA, handB);
  expect(r.winner).toBe('A'); // Aces beat Kings
});

test('Kicker Resolution', 'Flush: compare all 5 cards as kickers', () => {
  const handA = [c(13,'H'), c(10,'H'), c(8,'H'), c(5,'H'), c(2,'H')]; // K-high flush
  const handB = [c(13,'D'), c(10,'D'), c(8,'D'), c(5,'D'), c(3,'D')]; // K-high flush, 3 > 2
  const r = compareHands(handA, handB);
  expect(r.winner).toBe('B'); // B has 3 where A has 2
});

test('Kicker Resolution', 'Full house: higher triple wins', () => {
  const handA = [c(10,'S'), c(10,'H'), c(10,'D'), c(2,'C'), c(2,'S')]; // 10s full of 2s
  const handB = [c(9,'S'), c(9,'H'), c(9,'D'), c(1,'C'), c(1,'S')];   // 9s full of As
  const r = compareHands(handA, handB);
  expect(r.winner).toBe('A'); // 10s beat 9s regardless of pair
});

test('Kicker Resolution', 'Four of a Kind: higher quads wins', () => {
  const handA = [c(7,'S'), c(7,'H'), c(7,'D'), c(7,'C'), c(1,'S')];
  const handB = [c(6,'S'), c(6,'H'), c(6,'D'), c(6,'C'), c(1,'H')];
  const r = compareHands(handA, handB);
  expect(r.winner).toBe('A');
});

// ─── SUITE 4: Tiebreaker rules ───────────────────────────────────────────────

test('Tiebreaker Rules', 'Perfect tie → firstToStand wins', () => {
  // Identical hands — same ranks, same suits doesn't matter for value comparison
  const h = [c(1,'S'), c(13,'H'), c(12,'D'), c(11,'C'), c(10,'S')]; // A-high straight
  const r = compareHands(h, h, null, 'Alice', null, 'Alice', 'Bob');
  expect(r.winner).toBe('A');
});

test('Tiebreaker Rules', 'Perfect tie, Bob stood first → Bob wins', () => {
  const h = [c(1,'S'), c(13,'H'), c(12,'D'), c(11,'C'), c(10,'S')];
  const r = compareHands(h, h, null, 'Bob', null, 'Alice', 'Bob');
  expect(r.winner).toBe('B');
});

test('Tiebreaker Rules', 'Perfect tie, no stand, Alice completed hand first → A wins', () => {
  const h = [c(1,'S'), c(13,'H'), c(12,'D'), c(11,'C'), c(10,'S')];
  const r = compareHands(h, h, null, null, 'Alice', 'Alice', 'Bob');
  expect(r.winner).toBe('A');
});

test('Tiebreaker Rules', 'Perfect tie, no stand, Bob completed hand first → B wins', () => {
  const h = [c(1,'S'), c(13,'H'), c(12,'D'), c(11,'C'), c(10,'S')];
  const r = compareHands(h, h, null, null, 'Bob', 'Alice', 'Bob');
  expect(r.winner).toBe('B');
});

test('Tiebreaker Rules', 'Perfect absolute tie → Player A wins by default', () => {
  const h = [c(1,'S'), c(13,'H'), c(12,'D'), c(11,'C'), c(10,'S')];
  const r = compareHands(h, h, null, null, null, 'Alice', 'Bob');
  expect(r.winner).toBe('A');
});

test('Tiebreaker Rules', 'standingPlayer (single) used when firstToStand is null', () => {
  const h = [c(1,'S'), c(13,'H'), c(12,'D'), c(11,'C'), c(10,'S')];
  const r = compareHands(h, h, 'Bob', null, null, 'Alice', 'Bob');
  expect(r.winner).toBe('B');
});

test('Tiebreaker Rules', 'Custom player names respected in tiebreaker', () => {
  const h = [c(1,'S'), c(13,'H'), c(12,'D'), c(11,'C'), c(10,'S')];
  const r = compareHands(h, h, null, 'Player2', null, 'Player1', 'Player2');
  expect(r.winner).toBe('B');
});

// ─── SUITE 5: Hand ranking comparisons ──────────────────────────────────────

test('Hand Comparisons', 'Royal Flush > Straight Flush', () => {
  const rf  = [c(1,'S'), c(13,'S'), c(12,'S'), c(11,'S'), c(10,'S')];
  const sf  = [c(9,'H'), c(8,'H'), c(7,'H'), c(6,'H'), c(5,'H')];
  expect(compareHands(rf, sf).winner).toBe('A');
});

test('Hand Comparisons', 'Straight Flush > Four of a Kind', () => {
  const sf  = [c(9,'H'), c(8,'H'), c(7,'H'), c(6,'H'), c(5,'H')];
  const foak = [c(1,'S'), c(1,'H'), c(1,'D'), c(1,'C'), c(2,'S')];
  expect(compareHands(sf, foak).winner).toBe('A');
});

test('Hand Comparisons', 'Four of a Kind > Full House', () => {
  const foak = [c(3,'S'), c(3,'H'), c(3,'D'), c(3,'C'), c(2,'S')];
  const fh   = [c(1,'S'), c(1,'H'), c(1,'D'), c(13,'C'), c(13,'S')];
  expect(compareHands(foak, fh).winner).toBe('A');
});

test('Hand Comparisons', 'Full House > Flush', () => {
  const fh  = [c(2,'S'), c(2,'H'), c(2,'D'), c(3,'C'), c(3,'S')];
  const fl  = [c(1,'S'), c(13,'S'), c(12,'S'), c(11,'S'), c(9,'S')];
  expect(compareHands(fh, fl).winner).toBe('A');
});

test('Hand Comparisons', 'Flush > Straight', () => {
  const fl = [c(2,'D'), c(5,'D'), c(7,'D'), c(9,'D'), c(13,'D')];
  const st = [c(1,'S'), c(13,'H'), c(12,'D'), c(11,'C'), c(10,'S')];
  expect(compareHands(fl, st).winner).toBe('A');
});

test('Hand Comparisons', 'Straight > Three of a Kind', () => {
  const st   = [c(5,'S'), c(6,'H'), c(7,'D'), c(8,'C'), c(9,'S')];
  const toak = [c(1,'S'), c(1,'H'), c(1,'D'), c(2,'C'), c(3,'S')];
  expect(compareHands(st, toak).winner).toBe('A');
});

test('Hand Comparisons', 'Three of a Kind > Two Pair', () => {
  const toak = [c(2,'S'), c(2,'H'), c(2,'D'), c(3,'C'), c(4,'S')];
  const tp   = [c(1,'S'), c(1,'H'), c(13,'D'), c(13,'C'), c(12,'S')];
  expect(compareHands(toak, tp).winner).toBe('A');
});

test('Hand Comparisons', 'Two Pair > One Pair', () => {
  const tp = [c(2,'S'), c(2,'H'), c(3,'D'), c(3,'C'), c(4,'S')];
  const op = [c(1,'S'), c(1,'H'), c(13,'D'), c(12,'C'), c(11,'S')];
  expect(compareHands(tp, op).winner).toBe('A');
});

test('Hand Comparisons', 'One Pair > High Card', () => {
  const op = [c(2,'S'), c(2,'H'), c(3,'D'), c(4,'C'), c(5,'S')];
  const hc = [c(1,'S'), c(13,'H'), c(12,'D'), c(11,'C'), c(9,'S')];
  expect(compareHands(op, hc).winner).toBe('A');
});

// ─── SUITE 6: Edge cases ────────────────────────────────────────────────────

test('Edge Cases', 'Invalid hand (wrong count) returns rank 0', () => {
  const r = evaluatePokerHand([c(1,'S'), c(2,'H'), c(3,'D')]);
  expect(r.rank).toBe(0);
});

test('Edge Cases', 'Invalid hand (null) returns rank 0', () => {
  const r = evaluatePokerHand(null);
  expect(r.rank).toBe(0);
});

test('Edge Cases', 'Ace normalizes to 14 for kicker comparison', () => {
  const h = [c(1,'S'), c(2,'H'), c(4,'D'), c(6,'C'), c(8,'S')];
  const r = evaluatePokerHand(h);
  expect(r.kickers[0]).toBe(14); // Ace should be highest
});

test('Edge Cases', 'Four 5s: kicker correctly extracted (not another 5)', () => {
  const h = [c(5,'S'), c(5,'H'), c(5,'D'), c(5,'C'), c(9,'S')];
  const r = evaluatePokerHand(h);
  expect(r.kickers[1]).toBe(9);
});

test('Edge Cases', 'All same rank is Four of a Kind (not Full House)', () => {
  // Can't have 5 of a kind in a standard deck — but verify 4+1 works correctly
  const h = [c(8,'S'), c(8,'H'), c(8,'D'), c(8,'C'), c(3,'S')];
  const r = evaluatePokerHand(h);
  expect(r.rank).toBe(8);
});

test('Edge Cases', 'K Q J 10 9 straight flush: NOT confused with Royal Flush', () => {
  const h = [c(13,'H'), c(12,'H'), c(11,'H'), c(10,'H'), c(9,'H')];
  const r = evaluatePokerHand(h);
  expect(r.rank).toBe(9); // Straight Flush, not 10 (Royal)
});

test('Edge Cases', 'compareHands: winner reason string is non-empty', () => {
  const hA = [c(1,'S'), c(13,'H'), c(12,'D'), c(11,'C'), c(10,'S')];
  const hB = [c(9,'H'), c(8,'H'), c(7,'H'), c(6,'H'), c(5,'H')];
  const r = compareHands(hA, hB);
  if (!r.reason || r.reason.length === 0) throw new Error('reason should not be empty');
});

test('Edge Cases', 'Pair of 2s beats all high-card hands', () => {
  const pair = [c(2,'S'), c(2,'H'), c(3,'D'), c(4,'C'), c(5,'S')];
  const hc   = [c(1,'S'), c(13,'H'), c(12,'D'), c(11,'C'), c(9,'S')]; // A K Q J 9
  const r = compareHands(pair, hc);
  expect(r.winner).toBe('A');
});

// ─── Render results ─────────────────────────────────────────────────────────

const total = passed + failed;
document.getElementById('s-total').textContent = total;
document.getElementById('s-pass').textContent  = passed;
document.getElementById('s-fail').textContent  = failed;
document.getElementById('s-time').textContent  = (performance.now()).toFixed(0);

const container = document.getElementById('results');

Object.entries(suites).forEach(([suiteName, tests]) => {
  const suiteEl = document.createElement('div');
  suiteEl.className = 'suite';

  const suitePass = tests.filter(t => t.ok).length;
  const header = document.createElement('div');
  header.className = 'suite-title';
  header.textContent = `${suiteName}  (${suitePass}/${tests.length})`;
  suiteEl.appendChild(header);

  tests.forEach(t => {
    const row = document.createElement('div');
    row.className = `test ${t.ok ? 'pass' : 'fail'}`;
    row.dataset.status = t.ok ? 'pass' : 'fail';

    row.innerHTML = `
      <span class="icon">${t.ok ? '✅' : '❌'}</span>
      <div class="test-body">
        <div class="test-name">${t.name}</div>
        ${t.err ? `<div class="test-detail fail-msg">↳ ${t.err}</div>` : ''}
      </div>
      <span class="test-time">${t.ms}ms</span>
    `;
    suiteEl.appendChild(row);
  });

  container.appendChild(suiteEl);
});

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filter = btn.dataset.filter;
    document.querySelectorAll('.test').forEach(el => {
      if (filter === 'all') el.classList.remove('hidden');
      else if (filter === 'pass') el.classList.toggle('hidden', el.dataset.status !== 'pass');
      else el.classList.toggle('hidden', el.dataset.status !== 'fail');
    });
  });
});
</script>
